<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supabase Auth UI</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Inter",
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
      }
      body {
        margin: 0;
        background: #f4f6fb;
        color: #1f2937;
      }
      main {
        max-width: 720px;
        margin: 40px auto;
        padding: 24px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 20px;
        color: #475569;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        color: #334155;
      }
      input {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #cbd5f5;
        font-size: 14px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }
      button {
        padding: 10px 16px;
        border-radius: 999px;
        border: none;
        background: #1d4ed8;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: #475569;
      }
      button.ghost {
        background: transparent;
        color: #1d4ed8;
        border: 1px solid #93c5fd;
      }
      pre {
        background: #0f172a;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 12px;
        white-space: pre-wrap;
      }
      .status {
        margin-top: 16px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  </head>
  <body>
    <main>
      <h1>Supabase Auth UI</h1>
      <p>
        Enter your Supabase project URL and anon key to use email/password auth.
      </p>
      <div class="grid">
        <label>
          Supabase URL
          <input
            id="supabase-url"
            placeholder="https://xyzcompany.supabase.co"
          />
        </label>
        <label>
          Supabase anon key
          <input id="supabase-key" placeholder="eyJhbGciOi..." />
        </label>
        <button id="save-config" class="ghost" type="button">
          Save config
        </button>
      </div>
      <hr style="margin: 20px 0; border: none; border-top: 1px solid #e2e8f0" />
      <div class="grid">
        <label>
          Email
          <input id="email" placeholder="you@example.com" />
        </label>
        <label>
          Password
          <input id="password" type="password" placeholder="minimum 6 chars" />
        </label>
      </div>
      <div class="row">
        <button id="sign-up" type="button">Sign up</button>
        <button id="sign-in" type="button" class="secondary">Sign in</button>
        <button id="sign-out" type="button" class="ghost">Sign out</button>
      </div>
      <div class="status">
        <strong>Current user:</strong> <span id="user">none</span>
      </div>
      <pre id="status">Ready.</pre>
    </main>
    <script>
      const storageKey = "supabase-auth-config";
      const urlInput = document.getElementById("supabase-url");
      const keyInput = document.getElementById("supabase-key");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const statusEl = document.getElementById("status");
      const userEl = document.getElementById("user");
      let supabase = null;
      const setStatus = (message) => {
        statusEl.textContent = message;
      };
      const loadConfig = () => {
        try {
          const stored = JSON.parse(localStorage.getItem(storageKey) || "{}");
          if (stored.url) urlInput.value = stored.url;
          if (stored.key) keyInput.value = stored.key;
        } catch (_e) {
          // Ignore malformed storage.
        }
      };
      const saveConfig = () => {
        localStorage.setItem(
          storageKey,
          JSON.stringify({
            url: urlInput.value.trim(),
            key: keyInput.value.trim(),
          }),
        );
      };
      const initClient = () => {
        const url = urlInput.value.trim();
        const key = keyInput.value.trim();
        if (!url || !key) {
          setStatus("Missing Supabase URL or anon key.");
          supabase = null;
          return;
        }
        const lib = window.supabase;
        if (!lib || typeof lib.createClient !== "function") {
          setStatus("Supabase JS failed to load.");
          supabase = null;
          return;
        }
        supabase = lib.createClient(url, key);
        setStatus("Supabase client ready.");
      };
      const refreshUser = async () => {
        if (!supabase) {
          userEl.textContent = "none";
          return;
        }
        const { data, error } = await supabase.auth.getUser();
        if (error) {
          setStatus(error.message);
          userEl.textContent = "none";
          return;
        }
        userEl.textContent = data.user?.email || "none";
      };
      document.getElementById("save-config").addEventListener("click", () => {
        saveConfig();
        initClient();
        refreshUser();
      });
      document.getElementById("sign-up").addEventListener("click", async () => {
        if (!supabase) {
          setStatus("Configure Supabase first.");
          return;
        }
        setStatus("Signing up...");
        const { error } = await supabase.auth.signUp({
          email: emailInput.value.trim(),
          password: passwordInput.value,
        });
        if (error) {
          setStatus(error.message);
          return;
        }
        setStatus("Check your email to confirm the account.");
        refreshUser();
      });
      document.getElementById("sign-in").addEventListener("click", async () => {
        if (!supabase) {
          setStatus("Configure Supabase first.");
          return;
        }
        setStatus("Signing in...");
        const { error, data } = await supabase.auth.signInWithPassword({
          email: emailInput.value.trim(),
          password: passwordInput.value,
        });
        if (error) {
          setStatus(error.message);
          return;
        }
        setStatus("Signed in.");
        userEl.textContent = data.user?.email || "none";
      });
      document
        .getElementById("sign-out")
        .addEventListener("click", async () => {
          if (!supabase) {
            setStatus("Configure Supabase first.");
            return;
          }
          setStatus("Signing out...");
          const { error } = await supabase.auth.signOut();
          if (error) {
            setStatus(error.message);
            return;
          }
          userEl.textContent = "none";
          setStatus("Signed out.");
        });
      loadConfig();
      initClient();
      refreshUser();
    </script>
  </body>
</html>
